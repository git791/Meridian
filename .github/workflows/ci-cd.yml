name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: smart-meeting-scheduler
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with ruff
        run: ruff check backend/

      - name: Type check with mypy
        run: mypy backend/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=75
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_TEST }}
          DATABASE_URL: sqlite:///./test.db

      - name: Upload coverage
        uses: codecov/codecov-action@v3

  build-and-deploy:
    name: Build + Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push Docker image
        run: |
          docker build \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/meeting-scheduler/backend:${{ github.sha }} \
            --tag ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/meeting-scheduler/backend:latest \
            ./backend
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/meeting-scheduler/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/meeting-scheduler/backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/meeting-scheduler/backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 80 \
            --min-instances 0 \
            --max-instances 5 \
            --set-secrets "GEMINI_API_KEY=gemini-api-key:latest,DB_PASSWORD=db-password:latest" \
            --set-env-vars "GCP_PROJECT=${{ env.PROJECT_ID }},REGION=${{ env.REGION }}"

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          curl -f "$URL/health" || exit 1