steps:
  # Step 1: Run Python Unit Tests
  # Added PYTHONPATH=. to fix the ModuleNotFoundError in the cloud
  - name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r backend/requirements.txt
        cd backend && PYTHONPATH=. pytest tests/

  # Step 2: Build the Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/meridian-backend', './backend']

  # Step 3: Push to Artifact Registry (FIXED: Added missing 'name')
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meridian-backend']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'meridian-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/meridian-backend'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DEMO_MODE=true'

images:
  - 'gcr.io/$PROJECT_ID/meridian-backend'

options:
  logging: CLOUD_LOGGING_ONLY